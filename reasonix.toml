c=sed -n '135,138p' /cs/modules/update.mod.sh", "mcp__ssh_d165d9__exec=python3 -c \"\nimport sys\nline = '        find \\\"\\$PROJECT_ROOT\\\" -type f \\\\\\\\( -name \\\"*.sh\\\" -o -name \\\"cs\\\" \\\\\\\\) -exec chmod +x {} \\\\\\\\; 2>/dev/null'\nwith open('/cs/modules/update.mod.sh', 'r') as f:\n    content = f.read()\ncontent = content.replace(\n    'find \\\"\\$PROJECT_ROOT\\\" -type f -name \\\"*.sh\\\" -exec chmod +x {} \\\\; 2>/dev/null',\n    'find \\\"\\$PROJECT_ROOT\\\" -type f \\\\\\\\( -name \\\"*.sh\\\" -o -name \\\"cs\\\" \\\\\\\\) -exec chmod +x {} \\\\; 2>/dev/null'\n)\nwith open('/cs/modules/update.mod.sh', 'w') as f:\n    f.write(content)\nprint('OK')\n\"", "mcp__ssh_d165d9__exec=python3 << 'PYEOF'\nline = '        find \"$PROJECT_ROOT\" -type f \\\\( -name \"*.sh\" -o -name \"cs\" \\\\) -exec chmod +x {} \\\\; 2>/dev/null\\n'\nwith open('/cs/modules/update.mod.sh', 'r') as f:\n    content = f.read()\nold = '        find \"$PROJECT_ROOT\" -type f ( -name \"*.sh\" -o -name \"cs\" ) -exec chmod +x {} ; 2>/dev/null\\n'\ncontent = content.replace(old, line)\nwith open('/cs/modules/update.mod.sh', 'w') as f:\n    f.write(content)\nprint('OK')\nPYEOF", "bash=cd /d/bot/hamster-script && base64 -w0 modules/update.mod.sh", "mcp__ssh_d165d9__exec=echo '' | base64 -d > /tmp/update.mod.sh && cp /tmp/update.mod.sh /cs/modules/update.mod.sh", "mcp__ssh_d165d9__exec=python3 -c \"\nfn='/cs/modules/update.mod.sh'\nd=open(fn).read()\nd=d.replace(' -type f ( -name \\\"*.sh\\\" -o -name \\\"cs\\\" ) -exec',\n          ' -type f \\\\\\\\( -name \\\"*.sh\\\" -o -name \\\"cs\\\" \\\\\\\\) -exec')\nd=d.replace('{} ; 2>/dev/null','{} \\\\\\\\; 2>/dev/null')\nopen(fn,'w').write(d)\nprint('OK')\n\""]
# ask = ["write_file"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.
# [[plugins]]
# name    = "example"
# command = "reasonix-plugin-example"
