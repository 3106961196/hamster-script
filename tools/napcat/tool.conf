# NapCat 工具配置（路径唯一来源）

TOOL_KIND="napcat"
TOOL_NAME="NapCat"
NAPCAT_ZIP_URL="https://github.com/NapNeko/NapCatQQ/releases/latest/download/NapCat.Shell.zip"
NAPCAT_LAUNCHER="/opt/QQ/resources/app/app_launcher"
TOOL_INSTALL_DIR="${NAPCAT_LAUNCHER}/napcat"
NAPCAT_DEFAULT_PORT="2537"
TOOL_DEPS=(zip unzip jq curl xvfb screen xauth procps)
# 注意：linuxqq 不能写进 TOOL_DEPS，需由 NapCat 安装流程下载腾讯 deb

CONFIG_DIR="${TOOL_INSTALL_DIR}/config"
NAPCATBOT_FILE="${TOOL_INSTALL_DIR}/Napcatbot"
QQ_PACKAGE_JSON="/opt/QQ/resources/app/package.json"
QQ_MAIN_ORIGINAL="./launcher.node.js"
LOAD_NAPCAT_JS="/opt/QQ/resources/app/loadNapCat.js"
QQ_BIN="/opt/QQ/qq"
