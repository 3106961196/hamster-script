# Hamster Script tmux 主配置（模板 → setup 写入 ~/.tmux.conf）

set-environment -g TZ 'Asia/Shanghai'

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Tc"

unbind C-b
set -g prefix M-Space
bind M-Space send-prefix

set -g mouse on
set -g base-index 0
set -g pane-base-index 0
set -g renumber-windows on
set -g history-limit 3000
set -g status-interval 5
set -g focus-events on
set -s escape-time 0
set -g remain-on-exit off
set -g display-time 3000
set -g monitor-activity off
set -g visual-activity off
set -g detach-on-destroy off

setw -g automatic-rename off
setw -g allow-rename off
set -g set-titles off
setw -g aggressive-resize on

bind r source-file ~/.tmux.conf \; display "配置已重载"

bind c new-window -c "#{pane_current_path}"
bind w kill-pane
bind q kill-window
bind d detach-client
bind n command-prompt -I "#W" "rename-window -- \"%%\""
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-n previous-window
bind -n M-m next-window
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

set -g status-position bottom
set -g status-style "bg=default"
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#6c7086,bg=default] #I #W "
setw -g window-status-current-format "#[fg=#cba6f7,bg=#313244,bold] #I #W "
set -g status-left "#[fg=#cba6f7,bold] #S #[fg=#6c7086]• #[fg=#89b4fa]#H "
set -g status-left-length 40
set -g status-right "#[fg=#89b4fa]%Y-%m-%d #[fg=#cba6f7,bold]%H:%M "
set -g status-right-length 48
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "fg=#cba6f7,bg=#313244"
