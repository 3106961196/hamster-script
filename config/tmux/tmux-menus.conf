# @HAMSTER_MENU@ → bash <install>/config/tmux/tmux-menu.sh（setup 时替换）
bind ? run-shell '@HAMSTER_MENU@ help || true'

bind -n MouseDown3Pane display-menu -T '#[align=centre]Hamster · 窗格' -t = -x M -y M \
  '[编辑]' '' '' \
  '  复制模式' '[' 'copy-mode' \
  '  粘贴' 'p' 'paste-buffer' \
  '' '' '' \
  '[窗格]' '' '' \
  '  左右分割' 'v' 'split-window -h -c "#{pane_current_path}"' \
  '  上下分割' 's' 'split-window -v -c "#{pane_current_path}"' \
  '  最大化/还原' 'z' 'resize-pane -Z' \
  '  关闭窗格' 'w' 'kill-pane' \
  '' '' '' \
  '[窗口]' '' '' \
  '  新建窗口' 'c' 'new-window -c "#{pane_current_path}"' \
  '  重命名' 'n' 'command-prompt -I "#W" "rename-window -- \"%%\""' \
  '  关闭窗口' 'q' 'kill-window' \
  '' '' '' \
  '[系统]' '' '' \
  '  帮助' 'h' 'run-shell @HAMSTER_MENU@ help || true' \
  '  重载' 'r' 'source-file ~/.tmux.conf \; display "配置已重载"' \
  '  分离' 'd' 'detach-client'

bind -n MouseDown3Status display-menu -T '#[align=centre]Hamster · 窗口 · #{window_index}:#{window_name}' -t = -x M -y W \
  '[窗口]' '' '' \
  '  重命名' 'R' 'command-prompt -I "#W" "rename-window -- \"%%\""' \
  '  关闭' 'q' 'kill-window' \
  '  新建' 'c' 'new-window -c "#{pane_current_path}"' \
  '' '' '' \
  '[切换]' '' '' \
  '  上一个' 'P' 'previous-window' \
  '  下一个' 'N' 'next-window' \
  '' '' '' \
  '[系统]' '' '' \
  '  帮助' 'h' 'run-shell @HAMSTER_MENU@ help || true' \
  '  重载' 'r' 'source-file ~/.tmux.conf \; display "配置已重载"' \
  '  分离' 'd' 'detach-client'

bind \\ run-shell '@HAMSTER_MENU@ pane || true'
bind -n F9 run-shell '@HAMSTER_MENU@ pane || true'
